<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Bentus Touren – Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .section {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .section h2 {
            margin-top: 0;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #eee;
        }

        tr:nth-child(even) {
            background: #fafafa;
        }
    </style>
</head>
<body>

<h1>Bentus Touren – Dashboard</h1>

<div id="dashboard"></div>

<script>
async function loadDashboard() {
    const url = "https://bentus-touren-backend-1.onrender.com/dashboard";
    const response = await fetch(url);
    const data = await response.json();

    const container = document.getElementById("dashboard");

    function createTable(title, rows) {
        let html = `
            <div class="section">
                <h2>${title}</h2>
                <table>
                    <thead>
                        <tr>
        `;

        // Rubriker
        Object.keys(rows[0]).forEach(col => {
            html += `<th>${col}</th>`;
        });

        html += `
                        </tr>
                    </thead>
                    <tbody>
        `;

        // Rader
        rows.forEach(row => {
            html += "<tr>";
            Object.values(row).forEach(val => {
                html += `<td>${val}</td>`;
            });
            html += "</tr>";
        });

        html += `
                    </tbody>
                </table>
            </div>
        `;

        return html;
    }

    // Generera sektioner
    if (data.Topp5) container.innerHTML += createTable("Topp 5", data.Topp5);
    if (data.Spelade_rundor) container.innerHTML += createTable("Spelade rundor", data.Spelade_rundor);
    if (data.NH-liga) container.innerHTML += createTable("Närmast hål", data["NH-liga"]);
    if (data.LD-liga) container.innerHTML += createTable("Längsta drive", data["LD-liga"]);
    if (data.Deltävlingsvinster) container.innerHTML += createTable("Deltävlingsvinster", data.Deltävlingsvinster);
}

loadDashboard();
</script>

</body>
</html>
